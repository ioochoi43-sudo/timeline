<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>데일리 타임라인</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap"/>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root{
  --bg:#F2F2F0;--bg2:#FFFFFF;--bg3:#EBEBEB;--bg4:#E0E0E0;
  --text:#1C1C1E;--text2:#6C6C6E;--text3:#AEAEB2;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.14);
  --accent:#1C1C1E;--r:10px;--r-lg:16px;--r-xl:20px;
  --font:'Noto Sans KR',sans-serif;--mono:'DM Mono',monospace;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1C1C1E;--bg2:#2C2C2E;--bg3:#3A3A3C;--bg4:#48484A;
  --text:#F2F2F7;--text2:#AEAEB2;--text3:#636366;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.16);
  --accent:#F2F2F7;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
button,input,textarea{font-family:var(--font);cursor:pointer}
#app{display:flex;flex-direction:column;height:100dvh}

/* TOPBAR */
#topbar{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:10px 12px;gap:4px}
#topbar-center{flex:1;text-align:center}
#date-main{font-size:16px;font-weight:600}
#date-sub{font-size:11px;color:var(--text3);font-family:var(--mono)}
.tb-btn{width:36px;height:36px;border:none;background:none;color:var(--text2);border-radius:var(--r);display:flex;align-items:center;justify-content:center}
.tb-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#today-btn{border:1px solid var(--border2);border-radius:20px;font-size:12px;font-weight:500;color:var(--text2);padding:4px 10px;width:auto;height:auto;background:none}

/* COLLAPSIBLE INPUT PANEL */
#input-toggle-bar{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:8px 14px;cursor:pointer}
#input-toggle-bar .toggle-label{font-size:13px;font-weight:500;color:var(--text2);display:flex;align-items:center;gap:6px}
#input-toggle-bar .toggle-label svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#toggle-chevron{transition:transform .2s;color:var(--text3)}
#toggle-chevron svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#toggle-chevron.open{transform:rotate(180deg)}
#input-panel{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);overflow:hidden;transition:max-height .25s ease,padding .25s ease}

.time-row{display:flex;gap:8px;margin-bottom:8px}
.fg{display:flex;flex-direction:column;gap:3px;flex:1}
.fl{font-size:10px;font-weight:600;letter-spacing:.05em;color:var(--text3);text-transform:uppercase}
.tw{position:relative}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:16px;height:46px;padding:0 38px 0 12px;outline:none;-webkit-appearance:none;transition:border-color .15s}
.fi:focus{border-color:var(--border2)}
.fi.plain{padding-right:12px}
.fi.ta{height:58px;padding-top:10px;resize:none;line-height:1.5}
.now-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);display:flex;padding:3px}
.now-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.chip-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;border:1.5px solid transparent;font-size:12px;font-weight:500;background:var(--bg3);color:var(--text2);white-space:nowrap}
.chip.on{color:var(--text)}
.chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.btn-row{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;border:none;border-radius:var(--r);font-size:13px;font-weight:600;height:42px;padding:0 16px;flex:1}
.btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.btn-p{background:var(--accent);color:var(--bg)}
.btn-s{background:var(--bg3);color:var(--text);font-weight:500}

/* PENDING BAR */
#pending-bar{flex-shrink:0;background:var(--bg3);border-bottom:1px solid var(--border);padding:9px 14px;display:none;align-items:center;gap:8px}
#pending-bar.on{display:flex}
.pdot{width:7px;height:7px;border-radius:50%;background:#34C759;animation:pp 1.4s infinite;flex-shrink:0}
@keyframes pp{0%,100%{opacity:1}50%{opacity:.3}}
#pending-text{flex:1;font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lbtn{background:none;border:none;font-size:12px;font-weight:600;color:var(--text);padding:3px 0}
.lbtn.dim{color:var(--text3)}

/* WS BAR */
#ws-bar{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 14px;display:none;align-items:center;justify-content:space-between;gap:8px}
#ws-bar.on{display:flex}
.ws-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 0;border:1.5px solid var(--border);border-radius:var(--r);background:none;font-size:13px;font-weight:600;color:var(--text2);transition:all .15s}
.ws-btn:active{background:var(--bg3)}
.ws-btn.done{color:var(--text);border-color:var(--border2);background:var(--bg3)}
.ws-time{font-size:11px;font-family:var(--mono);font-weight:400;color:var(--text3);margin-top:1px}
.ws-divider{width:1px;background:var(--border);height:32px;flex-shrink:0}

/* CONTENT */
#content{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
.page.active{display:block}

/* TIMELINE */
.tl-wrap{padding:10px 10px 80px}
.tl-inner{display:flex}
.tl-axis{width:48px;flex-shrink:0}
.tl-hr{height:50px;display:flex;align-items:flex-start;padding-top:2px}
.tl-tick{font-size:10px;color:var(--text3);font-family:var(--mono);text-align:right;padding-right:8px;width:100%}
.tl-col{flex:1;position:relative;border-left:1px solid var(--border);overflow:visible}
.tl-row{height:50px;border-bottom:1px solid var(--border)}
.tl-row:last-child{border-bottom:none}
.tl-layer{position:absolute;inset:0;pointer-events:none}
.tl-block{position:absolute;border-radius:var(--r);padding:4px 7px;cursor:pointer;overflow:hidden;pointer-events:auto}
.tl-title{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.tl-meta{font-size:9px;opacity:.65;font-family:var(--mono);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-memo-text{font-size:9px;opacity:.55;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-pend{position:absolute;border-radius:var(--r);border:2px dashed;opacity:.6;display:flex;align-items:center;padding-left:8px;pointer-events:none}
.tl-pend-lbl{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.now-wrap{position:absolute;left:0;right:0;z-index:5;pointer-events:none}
.now-dot{position:absolute;left:-4px;top:-4px;width:8px;height:8px;border-radius:50%;background:#FF3B30}
.now-bar{position:absolute;left:0;right:0;height:2px;background:#FF3B30}
.tl-empty{text-align:center;padding:60px 20px;color:var(--text3)}

/* LIST */
.list-wrap{padding:12px 14px 80px}
.li{background:var(--bg2);border-radius:var(--r-lg);margin-bottom:8px;display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.li:active{background:var(--bg3)}
.li-bar{width:3px;height:36px;border-radius:2px;flex-shrink:0}
.li-info{flex:1;min-width:0}
.li-title{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li-meta{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:2px}
.li-memo{font-size:11px;color:var(--text3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li-cat{font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;flex-shrink:0}
.ib{width:32px;height:32px;border:none;background:none;display:flex;align-items:center;justify-content:center;border-radius:var(--r);color:var(--text3);flex-shrink:0}
.ib svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* STATS */
.sw{padding:14px 14px 80px}
.stat-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.stat-card{background:var(--bg2);border-radius:var(--r-lg);padding:14px}
.stat-num{font-size:22px;font-weight:600;font-family:var(--mono)}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:2px}
.cs-item{background:var(--bg2);border-radius:var(--r-lg);padding:12px 14px;margin-bottom:8px}
.cs-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.cs-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.cs-name{flex:1;font-size:13px;font-weight:500}
.cs-time{font-size:12px;font-family:var(--mono);color:var(--text2)}
.bar-t{height:4px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bar-f{height:100%;border-radius:3px}

/* SETTINGS */
.setw{padding:14px 14px 80px}
.sec-title{font-size:11px;font-weight:600;letter-spacing:.07em;color:var(--text3);text-transform:uppercase;margin-bottom:8px}
.sec-box{background:var(--bg2);border-radius:var(--r-lg);margin-bottom:16px;overflow:hidden}
.sec-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border)}
.sec-row:last-child{border-bottom:none}
.sec-lbl{font-size:14px;font-weight:500;flex:1}
.cp-wrap{width:26px;height:26px;border-radius:50%;border:2px solid var(--border2);position:relative;overflow:hidden;flex-shrink:0}
.cp-wrap input[type=color]{position:absolute;inset:-4px;opacity:0;width:calc(100%+8px);height:calc(100%+8px)}
.ni{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:13px;height:32px;padding:0 10px;outline:none}
.ni:focus{border-color:var(--border2)}
.sb{background:none;border:none;font-size:13px;font-weight:600;color:var(--text);padding:4px;flex-shrink:0}
.db{background:none;border:none;color:var(--text3);display:flex;padding:4px;flex-shrink:0}
.db svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.drag-handle{color:var(--text3);padding:4px;display:flex;flex-shrink:0;touch-action:none}
.drag-handle svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.cat-name-edit{flex:1;background:transparent;border:none;border-bottom:1px solid transparent;color:var(--text);font-size:14px;font-weight:500;padding:4px 2px;outline:none;font-family:var(--font)}
.exp-btn{width:100%;background:var(--accent);color:var(--bg);border:none;border-radius:var(--r-lg);font-size:14px;font-weight:600;padding:14px;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px}
.exp-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.exp-btn.secondary{background:var(--bg3);color:var(--text)}

/* BOTTOM NAV */
#bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0px);z-index:50}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 0 10px;border:none;background:none;color:var(--text3);min-height:56px}
.tab.on{color:var(--accent)}
.tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tab span{font-size:10px;font-weight:500}

/* MODALS */
.mback{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:flex-end;justify-content:center}
.mback.on{display:flex}
.msheet{background:var(--bg2);border-radius:var(--r-xl) var(--r-xl) 0 0;width:100%;max-height:88vh;overflow-y:auto;padding-bottom:calc(20px + env(safe-area-inset-bottom,0px))}
.mhandle{width:34px;height:4px;background:var(--bg3);border-radius:2px;margin:10px auto 0}
.mtitle{font-size:16px;font-weight:600;padding:14px 18px 10px;display:flex;align-items:center;gap:7px}
.mtitle svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.mbody{padding:0 18px}
.mfield{margin-bottom:12px}
.mlabel{font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--text3);text-transform:uppercase;margin-bottom:5px}
.minput{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:15px;height:44px;padding:0 12px;outline:none;-webkit-appearance:none;font-family:var(--font)}
.minput:focus{border-color:var(--border2)}
.minput.ta{height:80px;padding-top:10px;resize:none;line-height:1.6}
.mtime-row{display:flex;gap:8px;align-items:center}
.mtime-row .minput{font-family:var(--mono);font-size:14px}
.mact{display:flex;gap:8px;padding:14px 18px 0}
.mact-btn{flex:1;height:46px;border:none;border-radius:var(--r-lg);font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:5px;font-family:var(--font)}
.mact-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.mb-p{background:var(--accent);color:var(--bg)}
.mb-s{background:var(--bg3);color:var(--text)}
.mb-d{background:#FF3B30;color:#fff}
.det-preview{border-radius:var(--r-lg);padding:14px 16px;margin-bottom:16px}
.det-task{font-size:18px;font-weight:600;margin-bottom:3px}
.det-time{font-size:13px;opacity:.7;font-family:var(--mono)}
.det-dur{font-size:30px;font-weight:600;font-family:var(--mono);letter-spacing:-.02em;margin-bottom:2px}
.conf-icon{width:46px;height:46px;border-radius:50%;background:rgba(255,59,48,.1);display:flex;align-items:center;justify-content:center;margin:20px auto 14px}
.conf-icon svg{width:22px;height:22px;stroke:#FF3B30;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* CAPTURE */
#cap-modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;flex-direction:column;align-items:center;padding-top:24px}
#cap-modal.on{display:flex}
#cap-hint{width:calc(100vw - 28px);max-width:400px;background:rgba(0,0,0,.5);border-radius:12px 12px 0 0;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#cap-close{background:none;border:none;color:rgba(255,255,255,.75);font-size:22px;line-height:1;padding:0 4px}
#cap-card{background:#FFFFFF;width:calc(100vw - 28px);max-width:400px;border-radius:0 0 16px 16px;overflow:hidden;flex-shrink:0}
#cap-head{padding:14px 16px 10px;border-bottom:1px solid rgba(0,0,0,.07)}
#cap-dstr{font-size:17px;font-weight:600;color:#1C1C1E}
#cap-sum{font-size:11px;color:#AEAEB2;margin-top:2px;font-family:var(--mono)}
#cap-tl{padding:8px 12px 12px}
#cap-memo-area{border-top:1px solid rgba(0,0,0,.07);padding:10px 16px 14px;display:none}
#cap-memo-area.show{display:block}
.today-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#34C759;margin-left:5px;vertical-align:middle;margin-bottom:2px}
</style>
</head>
<body>
<div id="app">

<div id="topbar">
  <button class="tb-btn" id="btn-prev"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
  <div id="topbar-center"><div id="date-main"></div><div id="date-sub"></div></div>
  <button class="tb-btn" id="today-btn" style="width:auto">오늘</button>
  <button class="tb-btn" id="btn-next"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
</div>

<!-- 접기/펼치기 토글 바 -->
<div id="input-toggle-bar">
  <div class="toggle-label">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    기록 추가
  </div>
  <div id="toggle-chevron" class="open"><svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg></div>
</div>

<!-- 입력 패널 -->
<div id="input-panel">
  <div style="padding:12px 14px">
  <div class="time-row">
    <div class="fg">
      <span class="fl">시작</span>
      <div class="tw"><input type="time" class="fi" id="f-start"/><button class="now-btn" data-t="f-start"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></button></div>
    </div>
    <div class="fg">
      <span class="fl">종료</span>
      <div class="tw"><input type="time" class="fi" id="f-end"/><button class="now-btn" data-t="f-end"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></button></div>
    </div>
  </div>
  <input type="text" class="fi plain" id="f-task" placeholder="한 일을 입력하세요" maxlength="60" style="width:100%;margin-bottom:8px"/>
  <textarea class="fi plain ta" id="f-memo" placeholder="메모 (선택)" maxlength="200" style="width:100%;margin-bottom:10px"></textarea>
  <div class="chip-row" id="chip-row"></div>
  <div class="btn-row">
    <button class="btn btn-s" id="btn-start"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>시작</button>
    <button class="btn btn-p" id="btn-add"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>추가</button>
  </div>
  </div>
</div>

<div id="pending-bar">
  <div class="pdot"></div>
  <span id="pending-text"></span>
  <div style="display:flex;gap:8px;flex-shrink:0">
    <button class="lbtn" id="btn-finish">완료 →</button>
    <button class="lbtn dim" id="btn-cancel-pending">취소</button>
  </div>
</div>

<div id="ws-bar">
  <button class="ws-btn" id="btn-wakeup"><span>☀️</span><div><div>기상</div><div class="ws-time" id="wakeup-time"></div></div></button>
  <div class="ws-divider"></div>
  <button class="ws-btn" id="btn-sleep"><span>🌙</span><div><div>취침</div><div class="ws-time" id="sleep-time"></div></div></button>
</div>

<div id="content">
  <div class="page active" id="pg-timeline">
    <div class="tl-wrap" id="tl-wrap">
      <div class="tl-inner">
        <div class="tl-axis" id="tl-axis"></div>
        <div class="tl-col" id="tl-col"><div id="tl-grid"></div><div class="tl-layer" id="tl-layer"></div></div>
      </div>
    </div>
  </div>
  <div class="page" id="pg-list"><div class="list-wrap" id="list-wrap"></div></div>
  <div class="page" id="pg-stats"><div class="sw" id="stats-wrap"></div></div>
  <div class="page" id="pg-settings">
    <div class="setw">
      <div class="sec-title">카테고리 <span style="font-weight:400;color:var(--text3);font-size:10px">(꾹 눌러 순서 변경)</span></div>
      <div class="sec-box">
        <div id="cat-list"></div>
        <div class="sec-row">
          <div class="cp-wrap" id="ncp-wrap" style="background:#6B9FD4"><input type="color" id="ncp" value="#6B9FD4"/></div>
          <input type="text" class="ni" id="n-cat-name" placeholder="카테고리 이름"/>
          <button class="sb" id="btn-add-cat">추가</button>
        </div>
      </div>
      <div class="sec-title">캡처 미리보기</div>
      <button class="exp-btn" id="btn-export">

<script>
var HH=50;
var D={
  date:today0(),data:{},cats:{},ws:{},pending:null,
  editEntry:null,confirmCb:null,tab:'timeline',detEntry:null,selCat:null,
  inputOpen:true
};
function today0(){var d=new Date();d.setHours(0,0,0,0);return d;}

// ── STORAGE ──
function save(){
  try{
    localStorage.setItem('tl5-data',JSON.stringify(D.data));
    localStorage.setItem('tl5-cats',JSON.stringify(D.cats));
    localStorage.setItem('tl5-ws',JSON.stringify(D.ws));
    if(D.pending)localStorage.setItem('tl5-pending',JSON.stringify(D.pending));
    else localStorage.removeItem('tl5-pending');
  }catch(e){}
}
function loadData(){
  try{
    var d=localStorage.getItem('tl5-data')||localStorage.getItem('tl4-data')||localStorage.getItem('tl3-data');
    var c=localStorage.getItem('tl5-cats')||localStorage.getItem('tl4-cats')||localStorage.getItem('tl3-cats');
    var w=localStorage.getItem('tl5-ws')||localStorage.getItem('tl4-ws')||'{}';
    var p=localStorage.getItem('tl5-pending')||localStorage.getItem('tl4-pending')||localStorage.getItem('tl3-pending');
    if(d)D.data=JSON.parse(d);
    if(c)D.cats=JSON.parse(c);
    if(w)D.ws=JSON.parse(w);
    if(p)D.pending=JSON.parse(p);
  }catch(e){}
  if(!D.cats.list||!D.cats.list.length){
    D.cats={list:[
      {id:'c1',name:'업무',color:'#5B8FD4'},
      {id:'c2',name:'학습',color:'#4DB896'},
      {id:'c3',name:'건강',color:'#E8955A'},
      {id:'c4',name:'휴식',color:'#9B7FD4'},
    ]};
  }
  D.selCat=D.cats.list[0].id;
  save();
}

// ── UTILS ──
function dkey(d){return d.toISOString().slice(0,10);}
function pad(n){return String(n).padStart(2,'0');}
function toMin(t){if(!t)return 0;var p=t.split(':');return Number(p[0])*60+Number(p[1]);}
function fmtDur(m){
  if(m<=0)return '0분';
  if(m<60)return m+'분';
  var h=Math.floor(m/60),r=m%60;
  return h+'시간'+(r?' '+r+'분':'');
}
function nowStr(){var n=new Date();return pad(n.getHours())+':'+pad(n.getMinutes());}
function getCat(id){return(D.cats.list||[]).find(function(c){return c.id===id;})||null;}
function getEntries(){return D.data[dkey(D.date)]||[];}
function hexA(hex,a){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}
function fmtDate(d){
  var DAYS=['일','월','화','수','목','금','토'];
  var t=today0();var isToday=d.getTime()===t.getTime();
  return{
    main:(d.getMonth()+1)+'월 '+d.getDate()+'일'+(isToday?'<span class="today-dot"></span>':''),
    sub:d.getFullYear()+' '+DAYS[d.getDay()]+'요일'
  };
}

// ── INPUT PANEL TOGGLE ──
document.getElementById('input-toggle-bar').onclick=function(){
  D.inputOpen=!D.inputOpen;
  var panel=document.getElementById('input-panel');
  var chev=document.getElementById('toggle-chevron');
  if(D.inputOpen){
    panel.style.maxHeight='600px';
    panel.style.paddingTop='12px';
    panel.style.paddingBottom='12px';
    chev.classList.add('open');
  }else{
    panel.style.maxHeight='0';
    panel.style.paddingTop='0';
    panel.style.paddingBottom='0';
    chev.classList.remove('open');
  }
};

// ── DATE NAV ──
function renderDate(){
  var f=fmtDate(D.date);
  document.getElementById('date-main').innerHTML=f.main;
  document.getElementById('date-sub').textContent=f.sub;
}
document.getElementById('btn-prev').onclick=function(){D.date=new Date(D.date.getTime()-86400000);renderDate();renderAll();};

// ── TABS ──

    D.tab=btn.dataset.tab;

    document.getElementById('pg-'+D.tab).classList.add('active');

    document.getElementById('ws-bar').style.display=isTL?'flex':'none';
    renderAll();
  };
});

// ── CHIPS ──
function renderChips(cid,selId,onSel){
  var el=document.getElementById(cid);if(!el)return;
  el.innerHTML='';
  (D.cats.list||[]).forEach(function(c){
    var chip=document.createElement('div');
    chip.className='chip'+(selId===c.id?' on':'');
    chip.style.borderColor=selId===c.id?c.color:'transparent';
    chip.style.background=selId===c.id?hexA(c.color,.13):'var(--bg3)';
    chip.style.color=selId===c.id?c.color:'var(--text2)';
    chip.innerHTML='<div class="chip-dot" style="background:'+c.color+'"></div>'+c.name;
    chip.onclick=function(){onSel(c.id);};
    el.appendChild(chip);
  });
}
function refreshMainChips(){renderChips('chip-row',D.selCat,function(id){D.selCat=id;refreshMainChips();});}

// ── NOW BUTTONS ──
document.querySelectorAll('.now-btn').forEach(function(btn){

// ── ADD ENTRY ──
document.getElementById('btn-add').onclick=addEntry;
document.getElementById('f-task').addEventListener('keydown',function(e){if(e.key==='Enter')addEntry();});
function addEntry(){
  var start=document.getElementById('f-start').value;
  var end=document.getElementById('f-end').value;
  var task=document.getElementById('f-task').value.trim();
  var memo=document.getElementById('f-memo').value.trim();
  if(!start||!task){alert('시작 시간과 한 일을 입력해주세요.');return;}
  if(end&&toMin(start)>=toMin(end)){alert('종료 시간이 시작 시간보다 늦어야 해요.');return;}
  var key=dkey(D.date);
  if(!D.data[key])D.data[key]=[];
  D.data[key].push({id:''+Date.now()+Math.random(),start:start,end:end||null,task:task,catId:D.selCat,memo:memo||null});
  D.pending=null;hidePending();save();
  document.getElementById('f-task').value='';
  document.getElementById('f-end').value='';
  document.getElementById('f-memo').value='';
  renderAll();
}

// ── START ONLY ──
document.getElementById('btn-start').onclick=startOnly;
function startOnly(){
  var start=document.getElementById('f-start').value||nowStr();
  var task=document.getElementById('f-task').value.trim();
  var memo=document.getElementById('f-memo').value.trim();
  if(!task){alert('한 일을 입력해주세요.');return;}
  D.pending={start:start,task:task,catId:D.selCat,memo:memo||null};
  document.getElementById('f-start').value=start;
  save();showPending();renderTimeline();
}
function showPending(){
  if(!D.pending)return;
  var cat=getCat(D.pending.catId);
  document.getElementById('pending-text').textContent='"'+D.pending.task+'" '+D.pending.start+' 시작'+(cat?' · '+cat.name:'');
  document.getElementById('pending-bar').classList.add('on');
  document.getElementById('pending-bar').style.display='flex';

function hidePending(){
  document.getElementById('pending-bar').classList.remove('on');

}
document.getElementById('btn-finish').onclick=function(){
  if(!D.pending)return;
  document.getElementById('f-start').value=D.pending.start;
  document.getElementById('f-end').value=nowStr();
  document.getElementById('f-task').value=D.pending.task;
  document.getElementById('f-memo').value=D.pending.memo||'';

  D.inputOpen=true;
  var panel=document.getElementById('input-panel');
  panel.style.maxHeight='600px';
  panel.style.paddingTop='12px';
  panel.style.paddingBottom='12px';
  document.getElementById('toggle-chevron').classList.add('open');
  refreshMainChips();addEntry();
};
document.getElementById('btn-cancel-pending').onclick=function(){D.pending=null;save();hidePending();renderTimeline();};

// ── WAKEUP / SLEEP ──
function getWS(){return D.ws[dkey(D.date)]||{};}
function setWS(obj){D.ws[dkey(D.date)]=obj;save();}
function renderWS(){
  var ws=getWS();
  document.getElementById('wakeup-time').textContent=ws.wakeup||'';
  document.getElementById('sleep-time').textContent=ws.sleep||'';
  document.getElementById('btn-wakeup').classList.toggle('done',!!ws.wakeup);
  document.getElementById('btn-sleep').classList.toggle('done',!!ws.sleep);
}
document.getElementById('btn-wakeup').onclick=function(){
  var ws=getWS();
  if(ws.wakeup){openWSModal();}
  else{var o=Object.assign({},ws);o.wakeup=nowStr();setWS(o);renderWS();renderTimeline();}
};
document.getElementById('btn-sleep').onclick=function(){
  var ws=getWS();
  if(ws.sleep){openWSModal();}
  else{var o=Object.assign({},ws);o.sleep=nowStr();setWS(o);renderWS();renderTimeline();}
};
function openWSModal(){
  var ws=getWS();
  document.getElementById('ws-wakeup-input').value=ws.wakeup||'';
  document.getElementById('ws-sleep-input').value=ws.sleep||'';
  openM('m-ws');
}
document.getElementById('m-ws-cancel').onclick=function(){closeM('m-ws');};
document.getElementById('m-ws-save').onclick=function(){
  var ws=getWS();
  ws.wakeup=document.getElementById('ws-wakeup-input').value||null;
  ws.sleep=document.getElementById('ws-sleep-input').value||null;
  setWS(ws);closeM('m-ws');renderWS();renderTimeline();
};

// ── TIMELINE 겹침 처리 (최대 3컬럼) ──
var MAX_COLS=3;
function layoutBlocks(entries){
  var blocks=entries.filter(function(e){return e.end;}).map(function(e){
    return{entry:e,sm:toMin(e.start),em:toMin(e.end),col:-1,cols:1};
  }).sort(function(a,b){return a.sm-b.sm||a.em-b.em;});

  // 1단계: 각 블록에 컬럼 배정
  for(var i=0;i<blocks.length;i++){
    var taken=[];
    for(var j=0;j<i;j++){
      // j 블록과 i 블록이 시간 겹침
      if(blocks[j].em>blocks[i].sm&&blocks[j].sm<blocks[i].em){
        taken.push(blocks[j].col);
      }
    }
    var c=0;
    while(taken.indexOf(c)!==-1&&c<MAX_COLS-1)c++;
    blocks[i].col=c;
  }

  // 2단계: 같은 시간대에 겹치는 블록 그룹의 최대 컬럼 수를 동기화
  for(var i=0;i<blocks.length;i++){
    var maxC=blocks[i].col;
    for(var j=0;j<blocks.length;j++){
      if(i!==j&&blocks[j].em>blocks[i].sm&&blocks[j].sm<blocks[i].em){
        if(blocks[j].col>maxC)maxC=blocks[j].col;
      }
    }
    blocks[i].cols=Math.min(maxC+1,MAX_COLS);
  }
  return blocks;
}

function renderTimeline(){
  var axis=document.getElementById('tl-axis');
  var grid=document.getElementById('tl-grid');
  var layer=document.getElementById('tl-layer');
  axis.innerHTML='';grid.innerHTML='';layer.innerHTML='';

  var ws=getWS();
  var startHour=ws.wakeup?Math.floor(toMin(ws.wakeup)/60):0;
  var endHour=ws.sleep?Math.ceil(toMin(ws.sleep)/60):24;
  if(endHour<=startHour)endHour=startHour+1;

  for(var h=startHour;h<endHour;h++){
    var tr=document.createElement('div');tr.className='tl-hr';
    tr.innerHTML='<span class="tl-tick">'+pad(h)+':00</span>';
    axis.appendChild(tr);
    var gr=document.createElement('div');gr.className='tl-row';
    grid.appendChild(gr);
  }
  function m2top(m){return(m-startHour*60)/60*HH;}

  var entries=getEntries();
  if(!entries.length&&!D.pending&&!ws.wakeup&&!ws.sleep){
    var emp=document.createElement('div');emp.className='tl-empty';
    emp.innerHTML='<div style="font-size:28px;margin-bottom:8px">✏️</div><div style="font-size:14px">아직 기록이 없어요</div>';
    layer.appendChild(emp);return;
  }

  // 기상/취침 마커 (layer에 추가 → renderTimeline 시 자동 초기화됨)
  if(ws.wakeup){
    var wt=m2top(toMin(ws.wakeup));
    var wb=document.createElement('div');
    wb.style.cssText='position:absolute;top:'+wt+'px;left:-48px;right:0;z-index:6;pointer-events:none;display:flex;align-items:center;height:16px;transform:translateY(-50%)';
    wb.innerHTML='<div style="width:48px;flex-shrink:0;text-align:right;padding-right:6px;font-size:12px;line-height:1">☀️</div>'
      +'<div style="flex:1;height:1.5px;background:#F59E0B;opacity:.7;border-radius:1px"></div>';
    layer.appendChild(wb);
  }
  if(ws.sleep){
    var slt=m2top(toMin(ws.sleep));
    var sb=document.createElement('div');
    sb.style.cssText='position:absolute;top:'+slt+'px;left:-48px;right:0;z-index:6;pointer-events:none;display:flex;align-items:center;height:16px;transform:translateY(-50%)';
    sb.innerHTML='<div style="width:48px;flex-shrink:0;text-align:right;padding-right:6px;font-size:12px;line-height:1">🌙</div>'
      +'<div style="flex:1;height:1.5px;background:#818CF8;opacity:.7;border-radius:1px"></div>';
    layer.appendChild(sb);
  }

  // 진행 중
  if(D.pending){
    var p=D.pending;var pcat=getCat(p.catId);var pcol=pcat?pcat.color:'#888';
    var psm=toMin(p.start),pnm=toMin(nowStr());
    var pt=m2top(psm),pbh=Math.max(((pnm-psm)/60)*HH,20);
    var pd=document.createElement('div');pd.className='tl-pend';
    pd.style.cssText='top:'+pt+'px;height:'+pbh+'px;left:3px;right:3px;border-color:'+pcol+';color:'+pcol;
    pd.innerHTML='<span class="tl-pend-lbl">'+p.task+' (진행 중)</span>';
    layer.appendChild(pd);
  }

  // 겹침 처리된 블록 렌더링
  var laid=layoutBlocks(entries);
  // DOM 렌더 후 실제 너비 기반으로 그림
  requestAnimationFrame(function(){
    var colEl=document.getElementById('tl-col');
    if(!colEl)return;
    var totalW=colEl.offsetWidth;
    var PAD=3;
    laid.forEach(function(b){
      var en=b.entry;
      var cat=getCat(en.catId);var col=cat?cat.color:'#888';
      var dur=Math.max(b.em-b.sm,5);
      var top=m2top(b.sm);
      var bh=Math.max((dur/60)*HH,22);
      var bw=Math.floor((totalW-PAD*(b.cols+1))/b.cols);
      var bl=PAD+b.col*(bw+PAD);
      var block=document.createElement('div');block.className='tl-block';
      block.style.cssText='position:absolute;top:'+top+'px;height:'+bh+'px;'
        +'left:'+bl+'px;width:'+bw+'px;'
        +'background:'+hexA(col,.15)+';'
        +'border-left:3px solid '+col+';color:'+col+';'
        +'border-radius:var(--r);padding:4px 7px;cursor:pointer;overflow:hidden;pointer-events:auto';
      block.innerHTML='<div class="tl-title">'+en.task+'</div>'
        +(bh>36?'<div class="tl-meta">'+en.start+'–'+en.end+' · '+fmtDur(b.em-b.sm)+'</div>':'')
        +(bh>54&&en.memo?'<div class="tl-memo-text">'+en.memo+'</div>':'');
      block.onclick=function(){openDetail(en);};
      layer.appendChild(block);
    });
  });

  // 현재 시간선
  var t=today0();
  if(D.date.getTime()===t.getTime()){
    var n=new Date();var nm=n.getHours()*60+n.getMinutes();
    var nt=m2top(nm);
    var nl=document.createElement('div');nl.className='now-wrap';nl.style.top=nt+'px';
    nl.innerHTML='<div class="now-dot"></div><div class="now-bar"></div>';
    layer.appendChild(nl);
    var wrap=document.getElementById('tl-wrap');
    if(wrap)wrap.scrollTop=Math.max(0,nt-100);
  }
}

    +'<div class="stat-card"><div class="stat-num">'+(tot<60?tot+'m':Math.floor(tot/60)+'h'+(tot%60?' '+tot%60+'m':''))+'</div><div class="stat-lbl">활동 시간</div></div>'
    +'</div><div class="sec-title">카테고리별</div>';
  (D.cats.list||[]).forEach(function(c){
    var m=catMap[c.id]||0;if(!m)return;
    html+='<div class="cs-item"><div class="cs-row"><div class="cs-dot" style="background:'+c.color+'"></div><div class="cs-name">'+c.name+'</div><div class="cs-time">'+fmtDur(m)+'</div></div><div class="bar-t"><div class="bar-f" style="width:'+Math.round(m/maxMin*100)+'%;background:'+c.color+'"></div></div></div>';
  });

    ni.addEventListener('focus',function(){ni.style.cssText='flex:1;background:var(--bg3);border:none;border-radius:6px;color:var(--text);font-size:14px;font-weight:500;padding:4px 8px;outline:none;font-family:var(--font)';});
    ni.addEventListener('blur',function(){

      if(D.selCat===c.id)D.selCat=D.cats.list[0]?D.cats.list[0].id:null;
      save();renderCatList();refreshMainChips();
    };
    initDrag(row,el);
    el.appendChild(row);
  });
}
function initDrag(row,container){
  var handle=row.querySelector('.drag-handle');
  var startY=0,dragging=false;
  handle.addEventListener('touchstart',function(e){
    dragging=true;startY=e.touches[0].clientY;
    row.style.opacity='.5';e.preventDefault();
  },{passive:false});
  handle.addEventListener('touchmove',function(e){
    if(!dragging)return;
    var dy=e.touches[0].clientY-startY;
    var rows=[].slice.call(container.querySelectorAll('.sec-row[data-id]'));
    var ci=rows.indexOf(row);var rowH=row.offsetHeight;
    if(dy>rowH/2&&ci<rows.length-1){container.insertBefore(rows[ci+1],row);startY+=rowH;reorderCats(container);}
    else if(dy<-rowH/2&&ci>0){container.insertBefore(row,rows[ci-1]);startY-=rowH;reorderCats(container);}
    e.preventDefault();
  },{passive:false});
  handle.addEventListener('touchend',function(){dragging=false;row.style.opacity='';});
}
function reorderCats(container){
  var rows=[].slice.call(container.querySelectorAll('.sec-row[data-id]'));
  D.cats.list=rows.map(function(r){return getCat(r.getAttribute('data-id'));}).filter(Boolean);
  save();refreshMainChips();
}

document.getElementById('btn-data-export').onclick=function(){

  if(navigator.clipboard&&navigator.clipboard.writeText){

function fallbackCopy(text){
  var ta=document.createElement('textarea');
  ta.value=text;ta.style.cssText='position:fixed;top:0;left:0;opacity:0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');alert('복사됐어요!');}
  catch(e){alert('복사 실패. 직접 선택해서 복사해주세요.');}
  document.body.removeChild(ta);

document.getElementById('m-import-cancel').onclick=function(){closeM('m-import');};
document.getElementById('m-import-ok').onclick=function(){
  var text=document.getElementById('import-text').value.trim();
  var msg=document.getElementById('import-msg');
  if(!text){msg.style.color='#FF3B30';msg.textContent='텍스트를 붙여넣어주세요.';return;}
  try{
    var parsed=JSON.parse(text);
    if(!parsed.data||!parsed.cats){msg.style.color='#FF3B30';msg.textContent='올바른 형식이 아니에요.';return;}
    var newData=parsed.data||{};
    Object.keys(newData).forEach(function(k){
      if(!D.data[k])D.data[k]=[];
      var existIds=D.data[k].map(function(e){return e.id;});
      var toAdd=(newData[k]||[]).filter(function(e){return existIds.indexOf(e.id)===-1;});
      D.data[k]=D.data[k].concat(toAdd);
    });
    var newCats=(parsed.cats&&parsed.cats.list)||[];
    var existCatIds=(D.cats.list||[]).map(function(c){return c.id;});
    newCats.forEach(function(c){if(existCatIds.indexOf(c.id)===-1)D.cats.list.push(c);});
    var newWs=parsed.ws||{};
    Object.keys(newWs).forEach(function(k){if(!D.ws[k])D.ws[k]=newWs[k];});
    save();
    msg.style.color='#34C759';msg.textContent='가져오기 완료!';
    setTimeout(function(){closeM('m-import');renderAll();},800);
  }catch(e){msg.style.color='#FF3B30';msg.textContent='오류: 올바른 형식이 아니에요.';}
};

// ── CAPTURE (html2canvas 이미지 저장) ──
document.getElementById('btn-export').onclick=openCapture;
function openCapture(){
  var entries=getEntries().filter(function(e){return e.end;});
  var ws=getWS();
  if(!entries.length&&!ws.wakeup&&!ws.sleep){alert('저장할 기록이 없어요.');return;}

  var sorted=[].concat(entries).sort(function(a,b){return toMin(a.start)-toMin(b.start);});
  var f=fmtDate(D.date);
  var tot=entries.reduce(function(a,e){return a+Math.max(toMin(e.end)-toMin(e.start),0);},0);

  // 시간 범위
  var allMins=[];
  if(ws.wakeup)allMins.push(toMin(ws.wakeup));
  if(ws.sleep)allMins.push(toMin(ws.sleep));
  sorted.forEach(function(e){allMins.push(toMin(e.start));allMins.push(toMin(e.end));});
  var firstMin=allMins.length?Math.min.apply(null,allMins):0;
  var lastMin=allMins.length?Math.max.apply(null,allMins):1440;
  var rangeStart=Math.max(0,Math.floor((firstMin-15)/60)*60);
  var rangeEnd=Math.min(1440,Math.ceil((lastMin+15)/60)*60);
  var rangeMin=rangeEnd-rangeStart;

  // 카드 너비 390px 고정, 높이는 내용 기준으로 자동
  var CARD_W=390;
  var AW=44;
  var PPM=3.2; // 1분 = 3.2px (넉넉하게)
  var TL_H=Math.round(rangeMin*PPM);
  var BLOCK_W=CARD_W-AW-2;
  var PAD=3;

  function cm2top(m){return Math.round((m-rangeStart)*PPM);}

  // 헤더
  document.getElementById('cap-dstr').innerHTML=f.main;
  document.getElementById('cap-sum').textContent=f.sub+' · '+entries.length+'건 · '+fmtDur(tot);

  // 타임라인 HTML 생성
  var html='<div style="display:flex;height:'+TL_H+'px;position:relative">';

  // 시간 축
  html+='<div style="width:'+AW+'px;flex-shrink:0;position:relative">';
  for(var m=rangeStart;m<=rangeEnd;m+=60){
    html+='<div style="position:absolute;top:'+cm2top(m)+'px;right:6px;font-size:9px;color:#AEAEB2;font-family:DM Mono,monospace;transform:translateY(-50%);line-height:1;white-space:nowrap">'+pad(Math.floor(m/60))+':00</div>';
  }
  if(ws.wakeup){
    html+='<div style="position:absolute;top:'+cm2top(toMin(ws.wakeup))+'px;right:3px;font-size:12px;line-height:1;transform:translateY(-50%)">☀️</div>';
  }
  if(ws.sleep){
    html+='<div style="position:absolute;top:'+cm2top(toMin(ws.sleep))+'px;right:3px;font-size:12px;line-height:1;transform:translateY(-50%)">🌙</div>';
  }
  html+='</div>';

  // 블록 컬럼
  html+='<div style="flex:1;position:relative;border-left:1px solid rgba(0,0,0,.07)">';
  // 격자선
  for(var m=rangeStart;m<=rangeEnd;m+=60){
    html+='<div style="position:absolute;top:'+cm2top(m)+'px;left:0;right:0;height:1px;background:rgba(0,0,0,.07)"></div>';
  }
  // 기상/취침 선
  if(ws.wakeup){
    html+='<div style="position:absolute;top:'+cm2top(toMin(ws.wakeup))+'px;left:0;right:0;height:1.5px;background:#F59E0B;opacity:.6"></div>';
  }
  if(ws.sleep){
    html+='<div style="position:absolute;top:'+cm2top(toMin(ws.sleep))+'px;left:0;right:0;height:1.5px;background:#818CF8;opacity:.6"></div>';
  }
  // 겹침 레이아웃
  var capLaid=layoutBlocks(entries);
  capLaid.forEach(function(b){
    var en=b.entry;var cat=getCat(en.catId);var col=cat?cat.color:'#888';
    var dur=b.em-b.sm;
    var top=cm2top(b.sm);
    var bh=Math.max(Math.round(dur*PPM),20);
    var bw=Math.floor((BLOCK_W-PAD*(b.cols+1))/b.cols);
    var bl=PAD+b.col*(bw+PAD);
    var r=parseInt(col.slice(1,3),16),g=parseInt(col.slice(3,5),16),bv=parseInt(col.slice(5,7),16);
    html+='<div style="position:absolute;top:'+top+'px;height:'+bh+'px;left:'+bl+'px;width:'+bw+'px;'
      +'border-radius:6px;background:rgba('+r+','+g+','+bv+',.15);border-left:3px solid '+col+';'
      +'padding:3px 6px;overflow:hidden;display:flex;flex-direction:column;justify-content:center">'
      +'<div style="font-size:11px;font-weight:600;color:'+col+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3">'+en.task+'</div>'
      +(bh>=26?'<div style="font-size:9px;color:'+col+';opacity:.7;font-family:DM Mono,monospace;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+en.start+' – '+en.end+' · '+fmtDur(dur)+'</div>':'')
      +(bh>=42&&en.memo?'<div style="font-size:9px;color:'+col+';opacity:.55;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+en.memo+'</div>':'')
      +'</div>';
  });
  html+='</div></div>';

  document.getElementById('cap-tl').innerHTML=html;

  // html2canvas로 이미지 저장
  var card=document.getElementById('cap-card');
  card.style.left='-9999px';
  card.style.display='block';

  // 잠깐 기다렸다가 캔버스 변환 (렌더 완료 대기)
  setTimeout(function(){
    if(typeof html2canvas==='undefined'){
      alert('이미지 저장 라이브러리를 불러오는 중이에요. 잠시 후 다시 눌러주세요.');
      return;
    }
    html2canvas(card,{
      scale:2,
      useCORS:true,
      backgroundColor:'#FFFFFF',
      logging:false
    }).then(function(canvas){
      var filename='timeline-'+dkey(D.date)+'.png';
      canvas.toBlob(function(blob){
        if(navigator.share&&navigator.canShare&&navigator.canShare({files:[new File([blob],'x.png',{type:'image/png'})]})){
          navigator.share({
            files:[new File([blob],filename,{type:'image/png'})],
            title:'데일리 타임라인'
          }).catch(function(){});
        }else{
          var url=URL.createObjectURL(blob);
          var a=document.createElement('a');
          a.href=url;a.download=filename;
          document.body.appendChild(a);a.click();
          setTimeout(function(){URL.revokeObjectURL(url);document.body.removeChild(a);},1000);
        }
      },'image/png');
    }).catch(function(e){
      alert('이미지 저장 실패: '+e.message);
    });
  },300);
}

// ── RENDER ALL ──
function renderAll(){
  refreshMainChips();
  if(D.tab==='timeline'){renderTimeline();renderWS();}
  else if(D.tab==='list')renderList();
  else if(D.tab==='stats')renderStats();
  else if(D.tab==='settings')renderCatList();
}

// ── INIT ──
loadData();
renderDate();
refreshMainChips();
// input panel 초기 상태 (열림)
var panel=document.getElementById('input-panel');
panel.style.maxHeight='600px';
panel.style.paddingTop='12px';
panel.style.paddingBottom='12px';
renderTimeline();
renderWS();
document.getElementById('ws-bar').classList.add('on');
document.getElementById('f-start').value=nowStr();
if(D.pending)showPending();
setInterval(function(){
  var t=today0();
  if(D.date.getTime()===t.getTime()&&D.tab==='timeline')renderTimeline();
  if(D.pending&&D.tab==='timeline')showPending();
},60000);
</script>
