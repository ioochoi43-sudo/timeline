<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>데일리 타임라인</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap"/>
<style>
:root{
  --bg:#F5F3EE;--bg2:#FFFFFF;--bg3:#EDEBE5;
  --text:#1A1916;--text2:#64625C;--text3:#A09D96;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.18);
  --accent:#1A1916;
  --r:10px;--r-lg:16px;--r-xl:20px;
  --font:'Noto Sans KR',sans-serif;--mono:'DM Mono',monospace;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#141316;--bg2:#1E1C21;--bg3:#252329;
  --text:#F2EFE8;--text2:#96948E;--text3:#56544F;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.18);
  --accent:#F2EFE8;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
button,input,textarea{font-family:var(--font)}

#app{display:flex;flex-direction:column;height:100dvh}

/* TOPBAR */
#topbar{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:10px 12px;gap:4px}
#topbar-center{flex:1;text-align:center}
#date-main{font-size:16px;font-weight:600}
#date-sub{font-size:11px;color:var(--text3);font-family:var(--mono)}
.tb-btn{width:36px;height:36px;border:none;background:none;color:var(--text2);border-radius:var(--r);display:flex;align-items:center;justify-content:center}
.tb-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#today-btn{border:1px solid var(--border2);border-radius:20px;font-size:12px;font-weight:500;color:var(--text2);padding:4px 10px;width:auto;height:auto;background:none}

/* ADD PANEL */
#add-panel{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 14px}
.time-row{display:flex;gap:8px;margin-bottom:8px}
.fg{display:flex;flex-direction:column;gap:3px;flex:1}
.fl{font-size:10px;font-weight:600;letter-spacing:.05em;color:var(--text3);text-transform:uppercase}
.tw{position:relative}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:16px;height:46px;padding:0 38px 0 12px;outline:none;-webkit-appearance:none;transition:border-color .15s}
.fi:focus{border-color:var(--border2)}
.fi.plain{padding-right:12px}
.fi.ta{height:58px;padding-top:10px;resize:none;line-height:1.5}
.now-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);display:flex;padding:3px}
.now-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.chip-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;border:1.5px solid transparent;font-size:12px;font-weight:500;background:var(--bg3);color:var(--text2);white-space:nowrap;cursor:pointer}
.chip.on{color:var(--text)}
.chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.btn-row{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;border:none;border-radius:var(--r);font-size:13px;font-weight:600;height:42px;padding:0 16px;flex:1;cursor:pointer}
.btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.btn-p{background:var(--accent);color:var(--bg)}
.btn-s{background:var(--bg3);color:var(--text);font-weight:500}

/* PENDING BAR */
#pending-bar{flex-shrink:0;background:var(--bg3);border-bottom:1px solid var(--border);padding:9px 14px;display:none;align-items:center;gap:8px}
#pending-bar.on{display:flex}
.pdot{width:7px;height:7px;border-radius:50%;background:#22C55E;animation:pp 1.4s infinite;flex-shrink:0}
@keyframes pp{0%,100%{opacity:1}50%{opacity:.3}}
#pending-text{flex:1;font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lbtn{background:none;border:none;font-size:12px;font-weight:600;color:var(--text);padding:3px 0;cursor:pointer}
.lbtn.dim{color:var(--text3)}

/* CONTENT */
#content{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
.page.active{display:block}

/* TIMELINE */
.tl-wrap{padding:10px 10px 80px}
.tl-inner{display:flex}
.tl-axis{width:48px;flex-shrink:0}
.tl-hr{height:50px;display:flex;align-items:flex-start;padding-top:2px}
.tl-tick{font-size:10px;color:var(--text3);font-family:var(--mono);text-align:right;padding-right:8px;width:100%}
.tl-col{flex:1;position:relative;border-left:1px solid var(--border)}
.tl-row{height:50px;border-bottom:1px solid var(--border)}
.tl-row:last-child{border-bottom:none}
.tl-layer{position:absolute;inset:0;pointer-events:none}
.tl-block{position:absolute;left:5px;right:5px;border-radius:var(--r);padding:4px 8px;cursor:pointer;overflow:hidden;pointer-events:auto}
.tl-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.tl-meta{font-size:10px;opacity:.65;font-family:var(--mono);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-memo{font-size:10px;opacity:.55;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-pend{position:absolute;left:5px;right:5px;border-radius:var(--r);border:2px dashed;opacity:.55;display:flex;align-items:center;padding-left:8px}
.tl-pend-lbl{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.now-wrap{position:absolute;left:0;right:0;z-index:5;pointer-events:none}
.now-dot{position:absolute;left:-4px;top:-4px;width:8px;height:8px;border-radius:50%;background:#E24B4A}
.now-bar{position:absolute;left:0;right:0;height:2px;background:#E24B4A}
.tl-empty{text-align:center;padding:60px 20px;color:var(--text3)}

/* LIST */
.list-wrap{padding:12px 14px 80px}
.li{background:var(--bg2);border-radius:var(--r-lg);margin-bottom:8px;display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.li:active{background:var(--bg3)}
.li-bar{width:3px;height:36px;border-radius:2px;flex-shrink:0}
.li-info{flex:1;min-width:0}
.li-title{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li-meta{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:2px}
.li-memo{font-size:11px;color:var(--text3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li-cat{font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;flex-shrink:0}
.ib{width:32px;height:32px;border:none;background:none;display:flex;align-items:center;justify-content:center;border-radius:var(--r);color:var(--text3);flex-shrink:0;cursor:pointer}
.ib svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* STATS */
.sw{padding:14px 14px 80px}
.stat-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.stat-card{background:var(--bg2);border-radius:var(--r-lg);padding:14px}
.stat-num{font-size:22px;font-weight:600;font-family:var(--mono)}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:2px}
.cs-item{background:var(--bg2);border-radius:var(--r-lg);padding:12px 14px;margin-bottom:8px}
.cs-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.cs-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.cs-name{flex:1;font-size:13px;font-weight:500}
.cs-time{font-size:12px;font-family:var(--mono);color:var(--text2)}
.bar-t{height:4px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bar-f{height:100%;border-radius:3px}

/* SETTINGS */
.setw{padding:14px 14px 80px}
.sec-title{font-size:11px;font-weight:600;letter-spacing:.07em;color:var(--text3);text-transform:uppercase;margin-bottom:8px}
.sec-box{background:var(--bg2);border-radius:var(--r-lg);margin-bottom:16px;overflow:hidden}
.sec-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border)}
.sec-row:last-child{border-bottom:none}
.sec-lbl{font-size:14px;font-weight:500;flex:1}
.cp-wrap{width:26px;height:26px;border-radius:50%;border:2px solid var(--border2);position:relative;overflow:hidden;flex-shrink:0;cursor:pointer}
.cp-wrap input[type=color]{position:absolute;inset:-4px;opacity:0;width:calc(100%+8px);height:calc(100%+8px);cursor:pointer}
.ni{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:13px;height:32px;padding:0 10px;outline:none;transition:border-color .15s}
.ni:focus{border-color:var(--border2)}
.sb{background:none;border:none;font-size:13px;font-weight:600;color:var(--text);padding:4px;flex-shrink:0;cursor:pointer}
.db{background:none;border:none;color:var(--text3);display:flex;padding:4px;flex-shrink:0;cursor:pointer}
.db svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.cat-name-edit{flex:1;background:transparent;border:none;border-bottom:1px solid transparent;color:var(--text);font-size:14px;font-weight:500;padding:4px 2px;outline:none;font-family:var(--font);transition:all .15s}
.exp-btn{width:100%;background:var(--accent);color:var(--bg);border:none;border-radius:var(--r-lg);font-size:15px;font-weight:600;padding:15px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer}
.exp-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* BOTTOM NAV */
#bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0px);z-index:50}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 0 10px;border:none;background:none;color:var(--text3);min-height:56px;cursor:pointer}
.tab.on{color:var(--accent)}
.tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tab span{font-size:10px;font-weight:500}

/* MODALS */
.mback{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end;justify-content:center}
.mback.on{display:flex}
.msheet{background:var(--bg2);border-radius:var(--r-xl) var(--r-xl) 0 0;width:100%;max-height:88vh;overflow-y:auto;padding-bottom:calc(20px + env(safe-area-inset-bottom,0px))}
.mhandle{width:34px;height:4px;background:var(--bg3);border-radius:2px;margin:10px auto 0}
.mtitle{font-size:16px;font-weight:600;padding:14px 18px 10px;display:flex;align-items:center;gap:7px}
.mtitle svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.mbody{padding:0 18px}
.mfield{margin-bottom:12px}
.mlabel{font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--text3);text-transform:uppercase;margin-bottom:5px}
.minput{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:15px;height:44px;padding:0 12px;outline:none;-webkit-appearance:none;font-family:var(--font);transition:border-color .15s}
.minput:focus{border-color:var(--border2)}
.minput.ta{height:80px;padding-top:10px;resize:none;line-height:1.6}
.mtime-row{display:flex;gap:8px;align-items:center}
.mtime-row .minput{font-family:var(--mono);font-size:14px}
.mact{display:flex;gap:8px;padding:14px 18px 0}
.mact-btn{flex:1;height:46px;border:none;border-radius:var(--r-lg);font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:5px;font-family:var(--font);cursor:pointer}
.mact-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.mb-p{background:var(--accent);color:var(--bg)}
.mb-s{background:var(--bg3);color:var(--text)}
.mb-d{background:#E24B4A;color:#fff}
.det-preview{border-radius:var(--r-lg);padding:14px 16px;margin-bottom:16px}
.det-task{font-size:18px;font-weight:600;margin-bottom:3px}
.det-time{font-size:13px;opacity:.7;font-family:var(--mono)}
.det-dur{font-size:30px;font-weight:600;font-family:var(--mono);letter-spacing:-.02em;margin-bottom:2px}
.conf-icon{width:46px;height:46px;border-radius:50%;background:rgba(226,75,74,.12);display:flex;align-items:center;justify-content:center;margin:20px auto 14px}
.conf-icon svg{width:22px;height:22px;stroke:#E24B4A;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* CAPTURE */
#cap-modal{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:none;flex-direction:column;align-items:center;padding-top:24px}
#cap-modal.on{display:flex}
#cap-hint{width:calc(100vw - 28px);max-width:400px;background:rgba(0,0,0,.5);border-radius:12px 12px 0 0;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#cap-close{background:none;border:none;color:rgba(255,255,255,.75);font-size:22px;line-height:1;padding:0 4px;cursor:pointer}
#cap-card{background:var(--bg2);width:calc(100vw - 28px);max-width:400px;border-radius:0 0 16px 16px;overflow:hidden;flex-shrink:0}
#cap-head{padding:14px 16px 10px;border-bottom:1px solid var(--border)}
#cap-dstr{font-size:17px;font-weight:600}
#cap-sum{font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
#cap-tl{padding:8px 12px 12px}
#cap-memo-area{border-top:1px solid var(--border);padding:10px 16px 14px;display:none}
#cap-memo-area.show{display:block}

.today-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#22C55E;margin-left:5px;vertical-align:middle;margin-bottom:2px}

/* WAKEUP/SLEEP BAR */
#ws-bar{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 14px;display:none;align-items:center;justify-content:space-between;gap:8px}
#ws-bar.on{display:flex}
.ws-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 0;border:1.5px solid var(--border);border-radius:var(--r);background:none;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--font)}
.ws-btn:active{background:var(--bg3)}
.ws-btn.done{color:var(--text);border-color:var(--border2);background:var(--bg3)}
.ws-time{font-size:11px;font-family:var(--mono);font-weight:400;color:var(--text3);margin-top:1px}
</style>
</head>
<body>
<div id="app">

<!-- TOPBAR -->
<div id="topbar">
  <button class="tb-btn" id="btn-prev"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
  <div id="topbar-center">
    <div id="date-main"></div>
    <div id="date-sub"></div>
  </div>
  <button class="tb-btn" id="today-btn" style="width:auto">오늘</button>
  <button class="tb-btn" id="btn-next"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
</div>

<!-- ADD PANEL -->
<div id="add-panel">
  <div class="time-row">
    <div class="fg">
      <span class="fl">시작</span>
      <div class="tw">
        <input type="time" class="fi" id="f-start"/>
        <button class="now-btn" data-t="f-start"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></button>
      </div>
    </div>
    <div class="fg">
      <span class="fl">종료</span>
      <div class="tw">
        <input type="time" class="fi" id="f-end"/>
        <button class="now-btn" data-t="f-end"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></button>
      </div>
    </div>
  </div>
  <input type="text" class="fi plain" id="f-task" placeholder="한 일을 입력하세요" maxlength="60" style="width:100%;margin-bottom:8px"/>
  <textarea class="fi plain ta" id="f-memo" placeholder="메모 (선택)" maxlength="200" style="width:100%;margin-bottom:10px"></textarea>
  <div class="chip-row" id="chip-row"></div>
  <div class="btn-row">
    <button class="btn btn-s" id="btn-start">
      <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>시작
    </button>
    <button class="btn btn-p" id="btn-add">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>추가
    </button>
  </div>
</div>

<!-- PENDING BAR -->
<div id="pending-bar">
  <div class="pdot"></div>
  <span id="pending-text"></span>
  <div style="display:flex;gap:8px;flex-shrink:0">
    <button class="lbtn" id="btn-finish">완료 →</button>
    <button class="lbtn dim" id="btn-cancel-pending">취소</button>
  </div>
</div>

<!-- WAKEUP / SLEEP BAR -->
<div id="ws-bar">
  <button class="ws-btn" id="btn-wakeup">
    <span>🌅</span>
    <div>
      <div>기상</div>
      <div class="ws-time" id="wakeup-time"></div>
    </div>
  </button>
  <div style="width:1px;background:var(--border);height:32px;flex-shrink:0"></div>
  <button class="ws-btn" id="btn-sleep">
    <span>🌙</span>
    <div>
      <div>취침</div>
      <div class="ws-time" id="sleep-time"></div>
    </div>
  </button>
</div>

<!-- CONTENT -->
<div id="content">

  <!-- TIMELINE -->
  <div class="page active" id="pg-timeline">
    <div class="tl-wrap" id="tl-wrap">
      <div class="tl-inner">
        <div class="tl-axis" id="tl-axis"></div>
        <div class="tl-col" id="tl-col">
          <div id="tl-grid"></div>
          <div class="tl-layer" id="tl-layer"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- LIST -->
  <div class="page" id="pg-list">
    <div class="list-wrap" id="list-wrap"></div>
  </div>

  <!-- STATS -->
  <div class="page" id="pg-stats">
    <div class="sw" id="stats-wrap"></div>
  </div>

  <!-- SETTINGS -->
  <div class="page" id="pg-settings">
    <div class="setw">
      <div class="sec-title">카테고리</div>
      <div class="sec-box">
        <div id="cat-list"></div>
        <div class="sec-row">
          <div class="cp-wrap" id="ncp-wrap" style="background:#6B9FD4">
            <input type="color" id="ncp" value="#6B9FD4"/>
          </div>
          <input type="text" class="ni" id="n-cat-name" placeholder="카테고리 이름"/>
          <button class="sb" id="btn-add-cat">추가</button>
        </div>
      </div>
      <div class="sec-title">캡처 미리보기</div>
      <button class="exp-btn" id="btn-export">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        미리보기 열기 (스크린샷 저장)
      </button>
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav id="bnav">
  <button class="tab on" data-tab="timeline">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
    <span>타임라인</span>
  </button>
  <button class="tab" data-tab="list">
    <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1"/><circle cx="3.5" cy="12" r="1"/><circle cx="3.5" cy="18" r="1"/></svg>
    <span>목록</span>
  </button>

<script>
var HH=50;
var D={
  date:today0(), data:{}, cats:{}, ws:{}, pending:null,
  editEntry:null, confirmCb:null, tab:'timeline', detEntry:null
};

function today0(){var d=new Date();d.setHours(0,0,0,0);return d;}

// ── STORAGE ──
function save(){
  try{
    localStorage.setItem('tl4-data',JSON.stringify(D.data));
    localStorage.setItem('tl4-cats',JSON.stringify(D.cats));
    localStorage.setItem('tl4-ws',JSON.stringify(D.ws));
    if(D.pending) localStorage.setItem('tl4-pending',JSON.stringify(D.pending));
    else localStorage.removeItem('tl4-pending');
  }catch(e){}
}
function loadData(){
  try{
    var d=localStorage.getItem('tl4-data'); if(d) D.data=JSON.parse(d);
    var c=localStorage.getItem('tl4-cats'); if(c) D.cats=JSON.parse(c);
    var w=localStorage.getItem('tl4-ws'); if(w) D.ws=JSON.parse(w);
    var p=localStorage.getItem('tl4-pending'); if(p) D.pending=JSON.parse(p);
  }catch(e){}
  if(!D.cats.list||!D.cats.list.length){
    D.cats={list:[
      {id:'c1',name:'업무',color:'#5B8FD4'},
      {id:'c2',name:'학습',color:'#4DB896'},
      {id:'c3',name:'건강',color:'#E8955A'},
      {id:'c4',name:'휴식',color:'#9B7FD4'},
    ]};
    save();
  }
  D.selCat=D.cats.list[0].id;
}

// ── UTILS ──
function dkey(d){return d.toISOString().slice(0,10);}
function pad(n){return String(n).padStart(2,'0');}
function toMin(t){if(!t)return 0;var p=t.split(':');return Number(p[0])*60+Number(p[1]);}
function fmtDur(m){
  if(m<=0)return '0분';
  if(m<60)return m+'분';
  var h=Math.floor(m/60),r=m%60;
  return h+'시간'+(r?' '+r+'분':'');
}
function nowStr(){var n=new Date();return pad(n.getHours())+':'+pad(n.getMinutes());}
function getCat(id){return (D.cats.list||[]).find(function(c){return c.id===id;})||null;}
function getEntries(){return D.data[dkey(D.date)]||[];}
function hexA(hex,a){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}
function fmtDate(d){
  var DAYS=['일','월','화','수','목','금','토'];
  var t=today0();
  var isToday=d.getTime()===t.getTime();
  var main=(d.getMonth()+1)+'월 '+d.getDate()+'일'+(isToday?'<span class="today-dot"></span>':'');
  var sub=d.getFullYear()+' '+DAYS[d.getDay()]+'요일';
  return {main:main,sub:sub};
}

// ── DATE NAV ──
function renderDate(){
  var f=fmtDate(D.date);
  document.getElementById('date-main').innerHTML=f.main;
  document.getElementById('date-sub').textContent=f.sub;
}
document.getElementById('btn-prev').onclick=function(){
  D.date=new Date(D.date.getTime()-86400000);renderDate();renderAll();
};
document.getElementById('btn-next').onclick=function(){
  D.date=new Date(D.date.getTime()+86400000);renderDate();renderAll();
};
document.getElementById('today-btn').onclick=function(){
  D.date=today0();renderDate();renderAll();
};

// ── TABS ──
document.querySelectorAll('.tab').forEach(function(btn){
  btn.onclick=function(){
    D.tab=btn.dataset.tab;
    document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
    btn.classList.add('on');
    document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
    document.getElementById('pg-'+D.tab).classList.add('active');
    var isTimeline=D.tab==='timeline';
    document.getElementById('add-panel').style.display=isTimeline?'':'none';
    document.getElementById('pending-bar').style.display=(isTimeline&&D.pending)?'flex':'none';
    document.getElementById('ws-bar').style.display=isTimeline?'flex':'none';
    renderAll();
  };
});

// ── CHIPS ──
function renderChips(containerId,selId,onSelect){
  var el=document.getElementById(containerId);
  if(!el)return;
  el.innerHTML='';
  (D.cats.list||[]).forEach(function(c){
    var chip=document.createElement('div');
    chip.className='chip'+(selId===c.id?' on':'');
    chip.style.borderColor=selId===c.id?c.color:'transparent';
    chip.style.background=selId===c.id?hexA(c.color,.13):'var(--bg3)';
    chip.style.color=selId===c.id?c.color:'var(--text2)';
    chip.innerHTML='<div class="chip-dot" style="background:'+c.color+'"></div>'+c.name;
    chip.onclick=function(){onSelect(c.id);};
    el.appendChild(chip);
  });
}
function refreshMainChips(){
  renderChips('chip-row',D.selCat,function(id){D.selCat=id;refreshMainChips();});
}

// ── NOW BUTTONS ──
document.querySelectorAll('.now-btn').forEach(function(btn){
  btn.onclick=function(){document.getElementById(btn.dataset.t).value=nowStr();};
});

// ── ADD ENTRY ──
document.getElementById('btn-add').onclick=addEntry;
document.getElementById('f-task').addEventListener('keydown',function(e){if(e.key==='Enter')addEntry();});

function addEntry(){
  var start=document.getElementById('f-start').value;
  var end=document.getElementById('f-end').value;
  var task=document.getElementById('f-task').value.trim();
  var memo=document.getElementById('f-memo').value.trim();
  if(!start||!task){alert('시작 시간과 한 일을 입력해주세요.');return;}
  if(end&&toMin(start)>=toMin(end)){alert('종료 시간이 시작 시간보다 늦어야 해요.');return;}
  var key=dkey(D.date);
  if(!D.data[key])D.data[key]=[];
  D.data[key].push({
    id:''+Date.now()+Math.random(),
    start:start,end:end||null,task:task,catId:D.selCat,
    memo:memo||null
  });
  D.pending=null;
  hidePending();
  save();
  document.getElementById('f-task').value='';
  document.getElementById('f-end').value='';
  document.getElementById('f-memo').value='';
  renderAll();
}

// ── START ONLY ──
document.getElementById('btn-start').onclick=startOnly;
function startOnly(){
  var start=document.getElementById('f-start').value||nowStr();
  var task=document.getElementById('f-task').value.trim();
  var memo=document.getElementById('f-memo').value.trim();
  if(!task){alert('한 일을 입력해주세요.');return;}
  D.pending={start:start,task:task,catId:D.selCat,memo:memo||null};
  document.getElementById('f-start').value=start;
  save();
  showPending();
  renderTimeline();
}
function showPending(){
  if(!D.pending)return;
  var cat=getCat(D.pending.catId);
  document.getElementById('pending-text').textContent=
    '"'+D.pending.task+'" '+D.pending.start+' 시작'+(cat?' · '+cat.name:'');
  document.getElementById('pending-bar').classList.add('on');
}
function hidePending(){document.getElementById('pending-bar').classList.remove('on');}

document.getElementById('btn-finish').onclick=function(){
  if(!D.pending)return;
  document.getElementById('f-start').value=D.pending.start;
  document.getElementById('f-end').value=nowStr();
  document.getElementById('f-task').value=D.pending.task;
  document.getElementById('f-memo').value=D.pending.memo||'';
  D.selCat=D.pending.catId;
  refreshMainChips();
  addEntry();
};
document.getElementById('btn-cancel-pending').onclick=function(){
  D.pending=null;save();hidePending();renderTimeline();
};

// ── TIMELINE ──
function renderTimeline(){
  var axis=document.getElementById('tl-axis');
  var grid=document.getElementById('tl-grid');
  var layer=document.getElementById('tl-layer');
  axis.innerHTML='';grid.innerHTML='';layer.innerHTML='';

  var ws=D.ws[dkey(D.date)]||{};
  // 기상/취침 기준으로 표시 범위 결정
  var startHour = ws.wakeup ? Math.floor(toMin(ws.wakeup)/60) : 0;
  var endHour   = ws.sleep  ? Math.ceil(toMin(ws.sleep)/60)   : 24;
  // 최소 1시간 보장
  if(endHour <= startHour) endHour = startHour + 1;

  for(var h=startHour;h<endHour;h++){
    var tr=document.createElement('div');tr.className='tl-hr';
    tr.innerHTML='<span class="tl-tick">'+pad(h)+':00</span>';
    axis.appendChild(tr);
    var gr=document.createElement('div');gr.className='tl-row';
    grid.appendChild(gr);
  }

  // 분 → px 변환 (startHour 기준)
  function minToTop(m){ return (m - startHour*60)/60*HH; }

  var entries=getEntries();
  var hasContent=entries.length||D.pending;

  if(!hasContent&&!ws.wakeup&&!ws.sleep){
    var e=document.createElement('div');e.className='tl-empty';
    e.innerHTML='<div style="font-size:28px;margin-bottom:8px">✏️</div><div style="font-size:14px">아직 기록이 없어요</div>';
    layer.appendChild(e);return;
  }

  // 기상 블록
  if(ws.wakeup){
    var wTop=minToTop(toMin(ws.wakeup));
    var wb=document.createElement('div');
    wb.style.cssText='position:absolute;top:'+wTop+'px;left:5px;right:5px;z-index:3;pointer-events:none;'
      +'display:flex;align-items:center;gap:5px;padding:3px 8px;border-radius:6px;'
      +'background:rgba(245,158,11,.12);border-left:3px solid #F59E0B;color:#F59E0B';
    wb.innerHTML='<span style="font-size:13px">🌅</span>'
      +'<span style="font-size:11px;font-weight:600">기상</span>'
      +'<span style="font-size:10px;font-family:var(--mono);opacity:.8">'+ws.wakeup+'</span>';
    layer.appendChild(wb);
  }

  // 취침 블록
  if(ws.sleep){
    var sTop=minToTop(toMin(ws.sleep));
    var sb=document.createElement('div');
    sb.style.cssText='position:absolute;top:'+sTop+'px;left:5px;right:5px;z-index:3;pointer-events:none;'
      +'display:flex;align-items:center;gap:5px;padding:3px 8px;border-radius:6px;'
      +'background:rgba(129,140,248,.12);border-left:3px solid #818CF8;color:#818CF8';
    sb.innerHTML='<span style="font-size:13px">🌙</span>'
      +'<span style="font-size:11px;font-weight:600">취침</span>'
      +'<span style="font-size:10px;font-family:var(--mono);opacity:.8">'+ws.sleep+'</span>';
    layer.appendChild(sb);
  }

  // 진행 중 블록
  if(D.pending){
    var p=D.pending;var cat=getCat(p.catId);
    var pcolor=cat?cat.color:'#888';
    var psm=toMin(p.start),pnm=toMin(nowStr());
    var ptop=minToTop(psm),pbh=Math.max(((pnm-psm)/60)*HH,20);
    var pd=document.createElement('div');pd.className='tl-pend';
    pd.style.cssText='top:'+ptop+'px;height:'+pbh+'px;border-color:'+pcolor+';color:'+pcolor;
    pd.innerHTML='<span class="tl-pend-lbl">'+p.task+' (진행 중)</span>';
    layer.appendChild(pd);
  }

  // 기록 블록
  var sorted=[].concat(entries).sort(function(a,b){return toMin(a.start)-toMin(b.start);});
  sorted.forEach(function(entry){
    if(!entry.end)return;
    var cat=getCat(entry.catId);var color=cat?cat.color:'#888';
    var esm=toMin(entry.start),eem=toMin(entry.end),dur=Math.max(eem-esm,5);
    var etop=minToTop(esm),bh=Math.max((dur/60)*HH,22);
    var block=document.createElement('div');block.className='tl-block';
    block.style.cssText='top:'+etop+'px;height:'+bh+'px;background:'+hexA(color,.14)+';border-left:3px solid '+color+';color:'+color;
    block.innerHTML=
      '<div class="tl-title">'+entry.task+'</div>'+
      (bh>36?'<div class="tl-meta">'+entry.start+'–'+entry.end+' · '+fmtDur(eem-esm)+'</div>':'')+
      (bh>54&&entry.memo?'<div class="tl-memo">'+entry.memo+'</div>':'');
    block.onclick=function(){openDetail(entry);};
    layer.appendChild(block);
  });

  // 현재 시간선
  var t=today0();
  if(D.date.getTime()===t.getTime()){
    var n=new Date();var nm2=n.getHours()*60+n.getMinutes();
    var ntop=minToTop(nm2);
    var nl=document.createElement('div');nl.className='now-wrap';nl.style.top=ntop+'px';
    nl.innerHTML='<div class="now-dot"></div><div class="now-bar"></div>';
    layer.appendChild(nl);
    var wrap=document.getElementById('tl-wrap');
    if(wrap)wrap.scrollTop=Math.max(0,ntop-100);
  }
}

// ── LIST ──
function renderList(){
  var el=document.getElementById('list-wrap');
  var entries=[].concat(getEntries()).sort(function(a,b){return toMin(a.start)-toMin(b.start);});
  if(!entries.length){el.innerHTML='<div class="tl-empty"><div style="font-size:28px;margin-bottom:8px">📝</div><div style="font-size:14px">아직 기록이 없어요</div></div>';return;}
  el.innerHTML='';
  entries.forEach(function(entry){
    var cat=getCat(entry.catId);var color=cat?cat.color:'#888';
    var dur=entry.end?fmtDur(toMin(entry.end)-toMin(entry.start)):'진행 중';
    var item=document.createElement('div');item.className='li';
    item.innerHTML=
      '<div class="li-bar" style="background:'+color+'"></div>'+
      '<div class="li-info">'+
        '<div class="li-title">'+entry.task+'</div>'+
        '<div class="li-meta">'+entry.start+(entry.end?' – '+entry.end:'')+' · '+dur+'</div>'+
        (entry.memo?'<div class="li-memo">'+entry.memo+'</div>':'')+
      '</div>'+
      (cat?'<div class="li-cat" style="background:'+hexA(color,.13)+';color:'+color+'">'+cat.name+'</div>':'')+
      '<button class="ib" data-edit><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg></button>'+
      '<button class="ib" data-del style="color:#E24B4A"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>';
    item.querySelector('[data-edit]').onclick=function(ev){ev.stopPropagation();openEdit(entry);};
    item.querySelector('[data-del]').onclick=function(ev){ev.stopPropagation();confirmDel(entry);};
    item.onclick=function(){openDetail(entry);};
    el.appendChild(item);
  });
}

// ── STATS ──
function renderStats(){
  var el=document.getElementById('stats-wrap');
  var entries=getEntries().filter(function(e){return e.end;});
  var tot=entries.reduce(function(a,e){return a+Math.max(toMin(e.end)-toMin(e.start),0);},0);
  var f=fmtDate(D.date);
  var catMap={};
  entries.forEach(function(e){catMap[e.catId]=(catMap[e.catId]||0)+Math.max(toMin(e.end)-toMin(e.start),0);});
  var maxMin=Math.max.apply(null,[1].concat(Object.values(catMap)));
  var html='<div class="stat-cards">';
  html+='<div class="stat-card"><div class="stat-num">'+entries.length+'</div><div class="stat-lbl">기록 수</div></div>';
  html+='<div class="stat-card"><div class="stat-num">'+(tot<60?tot+'m':Math.floor(tot/60)+'h'+(tot%60?' '+tot%60+'m':''))+'</div><div class="stat-lbl">활동 시간</div></div>';
  html+='</div><div class="sec-title">카테고리별</div>';
  (D.cats.list||[]).forEach(function(c){
    var m=catMap[c.id]||0;if(!m)return;
    html+='<div class="cs-item">'+
      '<div class="cs-row"><div class="cs-dot" style="background:'+c.color+'"></div>'+
      '<div class="cs-name">'+c.name+'</div>'+
      '<div class="cs-time">'+fmtDur(m)+'</div></div>'+
      '<div class="bar-t"><div class="bar-f" style="width:'+Math.round(m/maxMin*100)+'%;background:'+c.color+'"></div></div>'+
      '</div>';
  });
  if(!entries.length)html+='<div style="color:var(--text3);font-size:14px;text-align:center;padding:30px">기록이 없어요</div>';
  el.innerHTML=html;
}

// ── SETTINGS ──
function renderCatList(){
  var el=document.getElementById('cat-list');
  el.innerHTML='';
  (D.cats.list||[]).forEach(function(c){
    var row=document.createElement('div');row.className='sec-row';
    var cpId='cp-'+c.id;
    row.innerHTML=
      '<div class="cp-wrap" id="'+cpId+'" style="background:'+c.color+'"><input type="color" value="'+c.color+'" data-cid="'+c.id+'"/></div>'+
      '<input type="text" class="cat-name-edit" value="'+c.name+'" maxlength="20"/>'+
      '<button class="db" data-del="'+c.id+'"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';
    var colorInp=row.querySelector('input[type=color]');
    colorInp.addEventListener('input',function(){
      var cat=getCat(c.id);if(!cat)return;
      cat.color=colorInp.value;
      document.getElementById(cpId).style.background=colorInp.value;
      save();refreshMainChips();
    });
    var nameInp=row.querySelector('.cat-name-edit');
    nameInp.addEventListener('focus',function(){
      nameInp.style.cssText='flex:1;background:var(--bg3);border:none;border-radius:6px;color:var(--text);font-size:14px;font-weight:500;padding:4px 8px;outline:none;font-family:var(--font)';
    });
    nameInp.addEventListener('blur',function(){
      nameInp.style.cssText='flex:1;background:transparent;border:none;border-bottom:1px solid transparent;color:var(--text);font-size:14px;font-weight:500;padding:4px 2px;outline:none;font-family:var(--font)';
      var newName=nameInp.value.trim();
      if(!newName){nameInp.value=c.name;return;}
      var cat=getCat(c.id);if(!cat)return;
      cat.name=newName;save();refreshMainChips();
    });
    nameInp.addEventListener('keydown',function(e){if(e.key==='Enter')nameInp.blur();});
    row.querySelector('[data-del]').onclick=function(){
      D.cats.list=D.cats.list.filter(function(x){return x.id!==c.id;});
      if(D.selCat===c.id)D.selCat=D.cats.list[0]?D.cats.list[0].id:null;
      save();renderCatList();refreshMainChips();
    };
    el.appendChild(row);
  });
}

document.getElementById('ncp').addEventListener('input',function(){
  document.getElementById('ncp-wrap').style.background=this.value;
});
document.getElementById('btn-add-cat').onclick=function(){
  var name=document.getElementById('n-cat-name').value.trim();
  if(!name)return;
  var color=document.getElementById('ncp').value;
  var id='c'+Date.now();
  D.cats.list.push({id:id,name:name,color:color});
  if(!D.selCat)D.selCat=id;
  document.getElementById('n-cat-name').value='';
  save();renderCatList();refreshMainChips();
};
document.getElementById('n-cat-name').addEventListener('keydown',function(e){
  if(e.key==='Enter')document.getElementById('btn-add-cat').click();
});

// ── DETAIL ──
function openDetail(entry){
  D.detEntry=entry;
  var cat=getCat(entry.catId);var color=cat?cat.color:'#888';
  var dur=entry.end?toMin(entry.end)-toMin(entry.start):null;
  document.getElementById('m-detail-body').innerHTML=
    '<div class="det-preview" style="background:'+hexA(color,.12)+';border-left:4px solid '+color+'">'+
      '<div class="det-task" style="color:'+color+'">'+entry.task+'</div>'+
      '<div class="det-time" style="color:'+color+'">'+entry.start+(entry.end?' – '+entry.end:' (진행 중)')+'</div>'+
    '</div>'+
    (dur!=null?'<div class="det-dur">'+fmtDur(dur)+'</div><div style="font-size:13px;color:var(--text3);margin-bottom:12px">소요 시간</div>':'')+
    (cat?'<div style="display:flex;align-items:center;gap:7px;margin-bottom:'+(entry.memo?'10':'4')+'px"><div style="width:9px;height:9px;border-radius:50%;background:'+color+'"></div><span style="font-size:14px;color:var(--text2)">'+cat.name+'</span></div>':'')+
    (entry.memo?'<div style="background:var(--bg3);border-radius:var(--r);padding:10px 12px;font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap;word-break:break-all;margin-bottom:4px">'+entry.memo+'</div>':'');
  openM('m-detail');
}
document.getElementById('m-det-close').onclick=function(){closeM('m-detail');};
document.getElementById('m-det-edit').onclick=function(){closeM('m-detail');openEdit(D.detEntry);};
document.getElementById('m-det-del').onclick=function(){closeM('m-detail');confirmDel(D.detEntry);};

// ── EDIT ──
function openEdit(entry){
  D.editEntry=Object.assign({},entry);
  document.getElementById('e-task').value=entry.task;
  document.getElementById('e-start').value=entry.start;
  document.getElementById('e-end').value=entry.end||'';
  document.getElementById('e-memo').value=entry.memo||'';
  renderChips('e-chips',entry.catId,function(id){
    D.editEntry.catId=id;
    renderChips('e-chips',D.editEntry.catId,arguments.callee);
  });
  openM('m-edit');
}
document.getElementById('m-edit-cancel').onclick=function(){closeM('m-edit');};
document.getElementById('m-edit-save').onclick=function(){
  var key=dkey(D.date);
  var arr=D.data[key]||[];
  var i=arr.findIndex(function(x){return x.id===D.editEntry.id;});
  if(i!==-1){
    arr[i]=Object.assign(arr[i],{
      task:document.getElementById('e-task').value.trim()||arr[i].task,
      start:document.getElementById('e-start').value||arr[i].start,
      end:document.getElementById('e-end').value||arr[i].end,
      catId:D.editEntry.catId,
      memo:document.getElementById('e-memo').value.trim()||null,
    });
    D.data[key]=arr;save();
  }
  closeM('m-edit');renderAll();
};

// ── CONFIRM DELETE ──
function confirmDel(entry){
  D.confirmCb=function(){
    var key=dkey(D.date);
    D.data[key]=(D.data[key]||[]).filter(function(x){return x.id!==entry.id;});
    save();renderAll();
  };
  document.getElementById('m-conf-sub').textContent='"'+entry.task+'"을(를) 삭제할까요?';
  openM('m-confirm');
}
document.getElementById('m-conf-cancel').onclick=function(){closeM('m-confirm');};
document.getElementById('m-conf-ok').onclick=function(){
  if(D.confirmCb){D.confirmCb();D.confirmCb=null;}
  closeM('m-confirm');
};

// ── MODALS ──
function openM(id){document.getElementById(id).classList.add('on');}
function closeM(id){document.getElementById(id).classList.remove('on');}
['m-detail','m-edit','m-confirm'].forEach(function(id){
  document.getElementById(id).addEventListener('click',function(ev){
    if(ev.target===this)closeM(id);
  });
});

// ── CAPTURE ──
document.getElementById('btn-export').onclick=openCapture;
document.getElementById('cap-close').onclick=function(){
  document.getElementById('cap-modal').classList.remove('on');
};

function openCapture(){
  var entries=getEntries().filter(function(e){return e.end;});
  if(!entries.length){alert('완료된 기록이 없어요.');return;}

  var sorted=[].concat(entries).sort(function(a,b){return toMin(a.start)-toMin(b.start);});
  var f=fmtDate(D.date);
  var tot=entries.reduce(function(a,e){return a+Math.max(toMin(e.end)-toMin(e.start),0);},0);

  document.getElementById('cap-dstr').innerHTML=f.main;
  document.getElementById('cap-sum').textContent=f.sub+' · '+entries.length+'건 · '+fmtDur(tot);

  // 메모
  var memoText='';
  entries.forEach(function(e){if(e.memo)memoText+=e.task+': '+e.memo+'\n';});
  memoText=memoText.trim();
  var memoArea=document.getElementById('cap-memo-area');
  if(memoText){
    document.getElementById('cap-memo-text').textContent=memoText;
    memoArea.classList.add('show');
  }else{
    memoArea.classList.remove('show');
  }

  // 시간 범위
  var firstMin=toMin(sorted[0].start);
  var lastMin=toMin(sorted[sorted.length-1].end);
  var rangeStart=Math.max(0,Math.floor((firstMin-15)/60)*60);
  var rangeEnd=Math.min(1440,Math.ceil((lastMin+15)/60)*60);
  var rangeMin=rangeEnd-rangeStart;

  // 카드 높이 계산
  var VH=window.innerHeight;
  var HINT_H=42;
  var HDR_H=62;
  var MEMO_H=memoText?Math.min(memoText.split('\n').length*20+36,100):0;
  var PAD_V=18;
  var CARD_H=VH-HINT_H-48; // 전체 카드 높이
  var TL_H=CARD_H-HDR_H-PAD_V-MEMO_H;

  // PPM = 타임라인 가용픽셀 / 분 범위 → 항상 딱 맞음
  var PPM=TL_H/rangeMin;
  var tickStep=60;
  var AW=38;

  document.getElementById('cap-card').style.height=CARD_H+'px';

  var html='<div style="display:flex;height:'+TL_H+'px">';
  html+='<div style="width:'+AW+'px;flex-shrink:0;position:relative">';
  for(var m=rangeStart;m<=rangeEnd;m+=tickStep){
    var top=Math.round((m-rangeStart)*PPM);
    html+='<div style="position:absolute;top:'+top+'px;right:5px;font-size:9px;color:var(--text3);font-family:var(--mono);transform:translateY(-50%);line-height:1">'+pad(Math.floor(m/60))+':'+pad(m%60)+'</div>';
  }
  html+='</div>';
  html+='<div style="flex:1;position:relative;border-left:1px solid var(--border)">';
  for(var m=rangeStart;m<=rangeEnd;m+=tickStep){
    var top=Math.round((m-rangeStart)*PPM);
    html+='<div style="position:absolute;top:'+top+'px;left:0;right:0;height:1px;background:var(--border)"></div>';
  }
  sorted.forEach(function(entry){
    var cat=getCat(entry.catId);var color=cat?cat.color:'#888';
    var sm=toMin(entry.start),em=toMin(entry.end),dur=em-sm;
    var top=Math.round((sm-rangeStart)*PPM);
    var bh=Math.max(Math.round(dur*PPM),18);
    html+='<div style="position:absolute;top:'+top+'px;height:'+bh+'px;left:4px;right:4px;border-radius:6px;background:'+hexA(color,.15)+';border-left:3px solid '+color+';padding:2px 6px;overflow:hidden;display:flex;flex-direction:column;justify-content:center">'+
      '<div style="font-size:11px;font-weight:600;color:'+color+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3">'+entry.task+'</div>'+
      (bh>=24?'<div style="font-size:9px;color:'+color+';opacity:.7;font-family:var(--mono);margin-top:1px">'+entry.start+' – '+entry.end+' · '+fmtDur(dur)+'</div>':'')+
      '</div>';
  });
  html+='</div></div>';

  document.getElementById('cap-tl').innerHTML=html;
  document.getElementById('cap-modal').classList.add('on');
}

// ── WAKEUP / SLEEP ──
function renderWS(){
  var key=dkey(D.date);
  var ws=D.ws[key]||{};
  var wBtn=document.getElementById('btn-wakeup');
  var sBtn=document.getElementById('btn-sleep');
  var wTime=document.getElementById('wakeup-time');
  var sTime=document.getElementById('sleep-time');
  if(ws.wakeup){
    wBtn.classList.add('done');
    wTime.textContent=ws.wakeup;
  }else{
    wBtn.classList.remove('done');
    wTime.textContent='';
  }
  if(ws.sleep){
    sBtn.classList.add('done');
    sTime.textContent=ws.sleep;
  }else{
    sBtn.classList.remove('done');
    sTime.textContent='';
  }
}

document.getElementById('btn-wakeup').onclick=function(){
  var key=dkey(D.date);
  if(!D.ws[key]) D.ws[key]={};
  if(D.ws[key].wakeup){
    D.confirmCb=function(){
      D.ws[key].wakeup=null;
      save();renderWS();renderTimeline();
    };
    document.getElementById('m-conf-sub').textContent='기상 기록('+D.ws[key].wakeup+')을 삭제할까요?';
    openM('m-confirm');
  } else {
    D.ws[key].wakeup=nowStr();
    save();renderWS();renderTimeline();
  }
};

document.getElementById('btn-sleep').onclick=function(){
  var key=dkey(D.date);
  if(!D.ws[key]) D.ws[key]={};
  if(D.ws[key].sleep){
    D.confirmCb=function(){
      D.ws[key].sleep=null;
      save();renderWS();renderTimeline();
    };
    document.getElementById('m-conf-sub').textContent='취침 기록('+D.ws[key].sleep+')을 삭제할까요?';
    openM('m-confirm');
  } else {
    D.ws[key].sleep=nowStr();
    save();renderWS();renderTimeline();
  }
};

// ── RENDER ALL ──
function renderAll(){
  refreshMainChips();
  if(D.tab==='timeline'){renderTimeline();renderWS();}
  else if(D.tab==='list')renderList();
  else if(D.tab==='stats')renderStats();
  else if(D.tab==='settings')renderCatList();
}

// ── INIT ──
loadData();
renderDate();
refreshMainChips();
renderTimeline();
renderWS();
document.getElementById('ws-bar').classList.add('on');
document.getElementById('f-start').value=nowStr();
if(D.pending)showPending();

setInterval(function(){
  var t=today0();
  if(D.date.getTime()===t.getTime()&&D.tab==='timeline')renderTimeline();
  if(D.pending)showPending();
},60000);
</script>
